<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Patient | NeuroCry AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], },
                    colors: {
                        brand: { blue: '#4A90E2', teal: '#2ED1C1', bg: '#F7F9FC' },
                    },
                    boxShadow: { 'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)', }
                }
            }
        }
    </script>
    <style>
        body { background-color: #F7F9FC; color: #334155; }
        .sidebar-link { transition: all 0.2s ease-in-out; }
        .sidebar-link:hover, .sidebar-link.active { background-color: #EFF6FF; color: #4A90E2; font-weight: 600; border-right: 4px solid #4A90E2; }
        .sidebar-link.active i { color: #4A90E2; }
        
        /* Form Styles */
        .form-input {
            width: 100%; border: 1px solid #E2E8F0; border-radius: 0.5rem; padding: 0.75rem 1rem;
            font-size: 0.875rem; color: #1E293B; outline: none; transition: border-color 0.2s;
        }
        .form-input:focus { border-color: #4A90E2; box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.1); }
        .form-label { display: block; font-size: 0.75rem; font-weight: 600; color: #64748B; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.05em; }
        
        /* Drag and Drop area */
        .dropzone {
            border: 2px dashed #CBD5E1; border-radius: 1rem; padding: 2.5rem; text-align: center;
            transition: all 0.3s ease; background-color: #F8FAFC; cursor: pointer;
        }
        .dropzone:hover, .dropzone.dragover {
            border-color: #4A90E2; background-color: #EFF6FF;
        }
    </style>
</head>
<body class="min-h-screen flex antialiased">

    <!-- SIDEBAR NAVIGATION -->
    <aside class="w-64 bg-white border-r border-slate-200 flex flex-col fixed h-full z-20 transition-transform duration-300 md:translate-x-0 -translate-x-full" id="sidebar">
        <!-- Logo -->
        <div class="h-20 flex items-center px-6 border-b border-slate-100">
            <div class="w-8 h-8 bg-brand-blue rounded-lg flex items-center justify-center mr-3 shadow-lg shadow-blue-500/20">
                <i class="fas fa-stethoscope text-white text-sm"></i>
            </div>
            <span class="text-xl font-bold tracking-tight text-slate-800">NeuroCry <span class="text-brand-blue">AI</span></span>
        </div>

        <!-- Nav Links -->
        <nav class="flex-1 overflow-y-auto py-6 space-y-1">
            <a href="dashboard.html" class="sidebar-link flex items-center px-6 py-3 text-slate-500">
                <i class="fas fa-chart-pie w-5 mr-3 text-slate-400"></i> Dashboard
            </a>
            <a href="patients.html" class="sidebar-link flex items-center px-6 py-3 text-slate-500">
                <i class="fas fa-users w-5 mr-3 text-slate-400"></i> Patient List
            </a>
            <a href="add-patient.html" class="sidebar-link active flex items-center px-6 py-3 text-slate-500">
                <i class="fas fa-user-plus w-5 mr-3 text-slate-400"></i> Register Patient
            </a>
            <a href="monitor.html" class="sidebar-link flex items-center px-6 py-3 text-slate-500">
                <i class="fas fa-wave-square w-5 mr-3 text-slate-400"></i> Cry Analysis
            </a>
        </nav>

        <!-- Footer / User -->
        <div class="p-6 border-t border-slate-100">
            <button onclick="logout()" class="flex items-center text-slate-500 hover:text-red-500 transition-colors text-sm font-medium w-full">
                <i class="fas fa-sign-out-alt mr-3"></i> Sign Out
            </button>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <div class="flex-1 md:ml-64 flex flex-col min-h-screen">
        
        <!-- TOP HEADER -->
        <header class="h-20 bg-white border-b border-slate-200 flex items-center justify-between px-8 sticky top-0 z-10">
            <div class="flex items-center gap-4">
                <button class="md:hidden text-slate-500" onclick="document.getElementById('sidebar').classList.toggle('-translate-x-full')">
                    <i class="fas fa-bars text-xl"></i>
                </button>
                <h1 class="text-2xl font-bold text-slate-800">Register Patient</h1>
            </div>
            
            <div class="flex items-center gap-6">
                <div class="w-10 h-10 bg-slate-100 rounded-full border border-slate-200 flex items-center justify-center text-slate-600">
                    <i class="fas fa-user-md"></i>
                </div>
            </div>
        </header>

        <!-- REGISTRATION CONTENT -->
        <main class="flex-1 p-8">
            <div class="max-w-4xl mx-auto space-y-8">
                
                <div id="statusAlert" class="hidden p-4 rounded-xl text-sm font-semibold border items-center justify-between"></div>

                <div class="bg-white rounded-2xl shadow-soft border border-slate-100 overflow-hidden text-slate-700">
                    <div class="px-8 py-6 border-b border-slate-100 bg-slate-50/50">
                        <h2 class="text-lg font-bold text-slate-800">Biometric Details</h2>
                        <p class="text-sm text-slate-500 mt-1">Enter the infant's information for the clinical record.</p>
                    </div>

                    <form id="onboardingForm" class="p-8">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                            <div>
                                <label class="form-label">Patient Full Name *</label>
                                <div class="relative">
                                    <i class="fas fa-user absolute left-4 top-3 text-slate-400"></i>
                                    <input type="text" id="patientName" class="form-input pl-10" required placeholder="e.g. Liam Johnson">
                                </div>
                            </div>
                            
                            <div>
                                <label class="form-label">Guardian / Parent Name *</label>
                                <div class="relative">
                                    <i class="fas fa-user-friends absolute left-4 top-3 text-slate-400"></i>
                                    <input type="text" id="parentName" class="form-input pl-10" required placeholder="e.g. Sarah Johnson">
                                </div>
                            </div>

                            <div>
                                <label class="form-label">Age (Weeks) *</label>
                                <div class="relative">
                                    <i class="fas fa-calendar absolute left-4 top-3 text-slate-400"></i>
                                    <input type="number" id="ageWeeks" min="0" class="form-input pl-10" required placeholder="12">
                                </div>
                            </div>
                            
                            <div>
                                <label class="form-label">Weight (Kg) *</label>
                                <div class="relative">
                                    <i class="fas fa-weight absolute left-4 top-3 text-slate-400"></i>
                                    <input type="number" step="0.01" id="weightKg" min="0" class="form-input pl-10" required placeholder="4.5">
                                </div>
                            </div>
                            
                            <div class="md:col-span-2">
                                <label class="form-label">Underlying Conditions (Optional)</label>
                                <div class="relative">
                                    <i class="fas fa-notes-medical absolute left-4 top-3 text-slate-400"></i>
                                    <input type="text" id="conditions" class="form-input pl-10" placeholder="e.g. Premature birth, reflux">
                                </div>
                            </div>
                        </div>

                        <!-- DIVIDER -->
                        <div class="relative py-8">
                            <div class="absolute inset-0 flex items-center" aria-hidden="true">
                                <div class="w-full border-t border-slate-200"></div>
                            </div>
                            <div class="relative flex justify-center">
                                <span class="px-4 bg-white text-sm text-slate-400 font-bold uppercase tracking-wider"><i class="fas fa-link mr-2"></i> Attach Clinical Media</span>
                            </div>
                        </div>

                        <!-- MEDIA UPLOAD -->
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
                            
                            <!-- Audio Upload -->
                            <div>
                                <label class="form-label mb-3">Diagnostic Audio (Required)</label>
                                <div class="dropzone" id="audioDropzone">
                                    <i class="fas fa-file-audio text-4xl text-brand-blue mb-4"></i>
                                    <p class="font-bold text-slate-700 mb-1">Upload Audio File</p>
                                    <p class="text-xs text-slate-500 mb-4">WAV, MP3, WEBM up to 10MB</p>
                                    <input type="file" id="audioFile" accept="audio/*" class="hidden">
                                    <button type="button" onclick="document.getElementById('audioFile').click()" class="px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-medium text-slate-700 shadow-sm hover:bg-slate-50 transition-colors">
                                        Browse Files
                                    </button>
                                    <div id="audioFileName" class="mt-3 text-sm font-semibold text-brand-blue truncate hidden"></div>
                                </div>
                            </div>

                            <!-- Video Upload -->
                            <div>
                                <label class="form-label mb-3">Monitoring Video (Optional)</label>
                                <div class="dropzone" id="videoDropzone">
                                    <i class="fas fa-file-video text-4xl text-brand-teal mb-4"></i>
                                    <p class="font-bold text-slate-700 mb-1">Upload Video File</p>
                                    <p class="text-xs text-slate-500 mb-4">MP4, WEBM up to 25MB</p>
                                    <input type="file" id="videoFile" accept="video/*" class="hidden">
                                    <button type="button" onclick="document.getElementById('videoFile').click()" class="px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-medium text-slate-700 shadow-sm hover:bg-slate-50 transition-colors">
                                        Browse Files
                                    </button>
                                    <div id="videoFileName" class="mt-3 text-sm font-semibold text-brand-teal truncate hidden"></div>
                                </div>
                            </div>
                        </div>

                        <!-- ACTIONS -->
                        <div class="flex items-center justify-between pt-6 border-t border-slate-100">
                            <button type="button" onclick="document.getElementById('onboardingForm').reset(); clearFiles();" class="text-slate-500 hover:text-slate-800 font-medium text-sm transition-colors">
                                <i class="fas fa-undo mr-2"></i> Clear Form
                            </button>
                            
                            <button type="submit" id="submitBtn" class="bg-brand-blue hover:bg-blue-600 text-white px-8 py-3 rounded-xl font-bold transition-all shadow-md shadow-blue-500/30 flex items-center gap-2">
                                <span>Register & Analyze</span>
                                <i class="fas fa-arrow-right"></i>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script src="auth.js"></script>
    <script>
        const API_URL = 'http://localhost:8000';

        // File Input Display Logic
        document.getElementById('audioFile').addEventListener('change', function(e) {
            const fileName = e.target.files[0]?.name;
            const display = document.getElementById('audioFileName');
            if(fileName) { display.textContent = fileName; display.classList.remove('hidden'); }
            else { display.classList.add('hidden'); }
        });

        document.getElementById('videoFile').addEventListener('change', function(e) {
            const fileName = e.target.files[0]?.name;
            const display = document.getElementById('videoFileName');
            if(fileName) { display.textContent = fileName; display.classList.remove('hidden'); }
            else { display.classList.add('hidden'); }
        });

        function clearFiles() {
            document.getElementById('audioFileName').classList.add('hidden');
            document.getElementById('videoFileName').classList.add('hidden');
        }

        function showStatus(message, isError = false) {
            const alert = document.getElementById('statusAlert');
            alert.className = `p-4 flex items-center gap-3 rounded-xl text-sm font-semibold border mb-6 ${
                isError ? 'bg-red-50 text-red-700 border-red-200' : 'bg-emerald-50 text-emerald-700 border-emerald-200'
            }`;
            alert.innerHTML = `
                <div class="flex items-center gap-2">
                    <i class="fas ${isError ? 'fa-exclamation-circle' : 'fa-check-circle'} text-lg"></i>
                    ${message}
                </div>
                <button onclick="this.parentElement.style.display='none'"><i class="fas fa-times opacity-50 hover:opacity-100"></i></button>
            `;
            alert.style.display = 'flex';
        }

        document.getElementById('onboardingForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            const originalContent = btn.innerHTML;
            btn.innerHTML = `<i class="fas fa-spinner fa-spin mr-2"></i> Processing...`;
            btn.disabled = true;
            document.getElementById('statusAlert').style.display = 'none';

            try {
                const audioFile = document.getElementById('audioFile').files[0];
                if (!audioFile) {
                    throw new Error("Diagnostic Audio is required for registration layout.");
                }

                const formData = new FormData();
                formData.append('name', document.getElementById('patientName').value);
                formData.append('age_weeks', document.getElementById('ageWeeks').value);
                formData.append('weight_kg', document.getElementById('weightKg').value);
                formData.append('parent_name', document.getElementById('parentName').value);
                formData.append('conditions', document.getElementById('conditions').value);
                
                formData.append('audio', audioFile);
                
                const videoFile = document.getElementById('videoFile').files[0];
                if (videoFile) formData.append('video', videoFile);

                const res = await fetch(`${API_URL}/api/patient/final-onboarding`, {
                    method: 'POST',
                    body: formData,
                    headers: { 'Authorization': `Bearer ${getToken()}` }
                });

                if (res.ok) {
                    const data = await res.json();
                    showStatus("Patient successfully registered and analyzed! Redirecting to profile...");
                    setTimeout(() => {
                        window.location.href = `profile.html?id=${data.patient.id}`;
                    }, 2000);
                } else {
                    const error = await res.json();
                    throw new Error(error.detail || "Upload failed");
                }
            } catch (err) {
                console.error(err);
                showStatus(err.message, true);
                btn.innerHTML = originalContent;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
