<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Login | NeuroCry AI</title>
<link rel="stylesheet" href="shared.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div class="auth-page">

  <!-- NAV -->
  <nav class="pub-nav">
    <div class="pub-nav-inner">
      <a href="index.html" class="nav-logo">
        <div class="nav-logo-icon"><i class="fas fa-stethoscope"></i></div>
        <div class="nav-logo-text">NeuroCry <span>AI</span></div>
      </a>
      <div class="pub-nav-links" id="pubNavLinks"></div>
      <div class="pub-nav-cta" id="pubNavCta"></div>
    </div>
  </nav>

  <div class="auth-body">
    <div class="auth-card">
      <div class="auth-icon"><i class="fas fa-sign-in-alt"></i></div>
      <h1 class="auth-title">Welcome Back</h1>
      <p class="auth-subtitle">Sign in to access your NeuroCry AI dashboard</p>

      <div id="alertBox" class="alert alert-error"><i class="fas fa-exclamation-circle"></i><span id="alertMsg"></span></div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <div class="input-wrap">
            <i class="fas fa-envelope input-icon"></i>
            <input type="email" id="email" class="form-input" placeholder="jane@hospital.com" autocomplete="email">
          </div>
          <div class="field-error" id="emailErr">Please enter a valid email</div>
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="input-wrap">
            <i class="fas fa-lock input-icon"></i>
            <input type="password" id="password" class="form-input" placeholder="Your password" autocomplete="current-password">
          </div>
          <div class="field-error" id="passwordErr">Password is required</div>
        </div>

        <button type="submit" class="btn btn-primary btn-block btn-lg" id="submitBtn" style="margin-top:8px">
          <i class="fas fa-sign-in-alt"></i> Sign In
        </button>
      </form>

      <div style="text-align:center;margin-top:16px;padding:12px 0;border-top:1px solid var(--border)">
        <p style="font-size:13px;color:var(--muted);margin-bottom:6px;font-weight:600">Don't have an account?</p>
        <a href="register.html" class="btn btn-outline btn-block"><i class="fas fa-user-plus"></i> Create Free Account</a>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <div class="footer-inner">
      <span class="footer-copy">© 2026 NeuroCry AI</span>
    </div>
  </footer>
</div>

<script src="app.js"></script>
<script>
  redirectIfLoggedIn();
  initPublicNav();

  document.getElementById('loginForm').addEventListener('submit', async e => {
    e.preventDefault();
    document.getElementById('alertBox').classList.remove('show');

    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    let valid = true;
    const emailErr = document.getElementById('emailErr');
    const passwordErr = document.getElementById('passwordErr');

    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      emailErr.classList.add('show');
      document.getElementById('email').classList.add('error');
      valid = false;
    } else { emailErr.classList.remove('show'); document.getElementById('email').classList.remove('error'); }

    if (!password) {
      passwordErr.classList.add('show');
      document.getElementById('password').classList.add('error');
      valid = false;
    } else { passwordErr.classList.remove('show'); document.getElementById('password').classList.remove('error'); }

    if (!valid) return;

    const btn = document.getElementById('submitBtn');
    setLoading(btn, true, 'Signing In...');

    try {
      const res  = await fetch(API + '/api/auth/login', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (!res.ok) {
        document.getElementById('alertMsg').textContent = data.error || 'Login failed. Check credentials.';
        document.getElementById('alertBox').classList.add('show');
        setLoading(btn, false);
        return;
      }
      setSession(data.access_token, data.user);
      showToast('Welcome back, ' + data.user.name + '!', 'success');
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 700);
    } catch (err) {
      document.getElementById('alertMsg').textContent = 'Cannot connect to server. Make sure NeuroCry backend is running on port 3001.';
      document.getElementById('alertBox').classList.add('show');
      setLoading(btn, false);
    }
  });
</script>
</body>
</html>
