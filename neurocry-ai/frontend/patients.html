<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Portal | NeuroCry AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], },
                    colors: {
                        brand: { blue: '#4A90E2', teal: '#2ED1C1', bg: '#F7F9FC' },
                    },
                    boxShadow: { 'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)', }
                }
            }
        }
    </script>
    <style>
        body { background-color: #F7F9FC; color: #334155; }
        .sidebar-link { transition: all 0.2s ease-in-out; }
        .sidebar-link:hover, .sidebar-link.active { background-color: #EFF6FF; color: #4A90E2; font-weight: 600; border-right: 4px solid #4A90E2; }
        .sidebar-link.active i { color: #4A90E2; }
        
        .patient-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .patient-card:hover { transform: translateY(-4px); box-shadow: 0 10px 25px -5px rgba(74, 144, 226, 0.15); border-color: #4A90E2; }
    </style>
</head>
<body class="min-h-screen flex antialiased">

    <!-- SIDEBAR NAVIGATION -->
    <aside class="w-64 bg-white border-r border-slate-200 flex flex-col fixed h-full z-20 transition-transform duration-300 md:translate-x-0 -translate-x-full" id="sidebar">
        <!-- Logo -->
        <div class="h-20 flex items-center px-6 border-b border-slate-100">
            <div class="w-8 h-8 bg-brand-blue rounded-lg flex items-center justify-center mr-3 shadow-lg shadow-blue-500/20">
                <i class="fas fa-stethoscope text-white text-sm"></i>
            </div>
            <span class="text-xl font-bold tracking-tight text-slate-800">NeuroCry <span class="text-brand-blue">AI</span></span>
        </div>

        <!-- Nav Links -->
        <nav class="flex-1 overflow-y-auto py-6 space-y-1">
            <a href="dashboard.html" class="sidebar-link flex items-center px-6 py-3 text-slate-500">
                <i class="fas fa-chart-pie w-5 mr-3 text-slate-400"></i> Dashboard
            </a>
            <a href="patients.html" class="sidebar-link active flex items-center px-6 py-3 text-slate-500">
                <i class="fas fa-users w-5 mr-3 text-slate-400"></i> Patient List
            </a>
            <a href="add-patient.html" class="sidebar-link flex items-center px-6 py-3 text-slate-500">
                <i class="fas fa-user-plus w-5 mr-3 text-slate-400"></i> Register Patient
            </a>
            <a href="monitor.html" class="sidebar-link flex items-center px-6 py-3 text-slate-500">
                <i class="fas fa-wave-square w-5 mr-3 text-slate-400"></i> Cry Analysis
            </a>
        </nav>

        <!-- Footer / User -->
        <div class="p-6 border-t border-slate-100">
            <button onclick="logout()" class="flex items-center text-slate-500 hover:text-red-500 transition-colors text-sm font-medium w-full">
                <i class="fas fa-sign-out-alt mr-3"></i> Sign Out
            </button>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <div class="flex-1 md:ml-64 flex flex-col min-h-screen">
        
        <!-- TOP HEADER -->
        <header class="h-20 bg-white border-b border-slate-200 flex items-center justify-between px-8 sticky top-0 z-10">
            <div class="flex items-center gap-4">
                <button class="md:hidden text-slate-500" onclick="document.getElementById('sidebar').classList.toggle('-translate-x-full')">
                    <i class="fas fa-bars text-xl"></i>
                </button>
                <h1 class="text-2xl font-bold text-slate-800">Patient Directory</h1>
            </div>
            
            <div class="flex items-center gap-4">
                <div class="relative hidden sm:block">
                    <i class="fas fa-search absolute left-3 top-2.5 text-slate-400"></i>
                    <input type="text" placeholder="Search patients..." class="pl-10 pr-4 py-2 border border-slate-200 rounded-lg text-sm bg-slate-50 focus:bg-white focus:border-brand-blue outline-none transition-colors w-64">
                </div>
                <div class="w-10 h-10 bg-slate-100 rounded-full border border-slate-200 flex items-center justify-center text-slate-600">
                    <i class="fas fa-user-md"></i>
                </div>
            </div>
        </header>

        <!-- DIRECTORY CONTENT -->
        <main class="flex-1 p-8">
            <div class="flex justify-between items-center mb-8">
                <p class="text-slate-500">Select a patient card to view their complete biometric and cry analysis history.</p>
                <a href="add-patient.html" class="hidden sm:flex items-center gap-2 bg-brand-blue hover:bg-blue-600 text-white px-4 py-2 rounded-lg font-semibold text-sm transition-colors shadow-soft">
                    <i class="fas fa-plus"></i> New Patient
                </a>
            </div>

            <div id="loading" class="text-center py-20 text-slate-400">
                <i class="fas fa-circle-notch fa-spin text-3xl mb-4 text-brand-blue"></i>
                <p>Loading patient records...</p>
            </div>

            <div id="patientsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 hidden">
                <!-- Data injected here -->
            </div>
            
            <div id="emptyState" class="hidden text-center py-20 bg-white rounded-2xl border border-slate-100 shadow-soft">
                <div class="w-20 h-20 bg-slate-50 text-slate-300 rounded-full flex items-center justify-center text-4xl mx-auto mb-4">
                    <i class="fas fa-folder-open"></i>
                </div>
                <h3 class="text-lg font-bold text-slate-800">No Patients Found</h3>
                <p class="text-slate-500 mb-6">Your clinic roster is currently empty.</p>
                <a href="add-patient.html" class="inline-flex items-center gap-2 bg-brand-blue hover:bg-blue-600 text-white px-6 py-2.5 rounded-lg font-semibold transition-colors">
                    Register First Patient
                </a>
            </div>

        </main>
    </div>

    <script src="auth.js"></script>
    <script>
        const API_URL = 'http://localhost:8000';

        // Avatar background colors based on name length
        const bgColors = ['bg-blue-100 text-blue-600', 'bg-teal-100 text-teal-600', 'bg-emerald-100 text-emerald-600', 'bg-purple-100 text-purple-600', 'bg-orange-100 text-orange-600'];

        async function fetchPatients() {
            try {
                const res = await fetch(`${API_URL}/api/patients`, {
                    headers: { 'Authorization': `Bearer ${getToken()}` }
                });

                document.getElementById('loading').classList.add('hidden');
                
                if (res.ok) {
                    const patients = await res.json();
                    
                    if(patients.length === 0) {
                        document.getElementById('emptyState').classList.remove('hidden');
                    } else {
                        const grid = document.getElementById('patientsGrid');
                        grid.classList.remove('hidden');

                        patients.forEach(patient => {
                            const initial = patient.name.charAt(0).toUpperCase();
                            const colorClass = bgColors[patient.name.length % bgColors.length];
                            
                            // Get most recent analysis info if any
                            let lastUpdateText = "No analyses yet";
                            let statusIconClass = "text-slate-300";
                            
                            if (patient.analyses && patient.analyses.length > 0) {
                                const latest = patient.analyses[patient.analyses.length - 1];
                                const dateStr = new Date(latest.timestamp).toLocaleDateString([], {month: 'short', day: 'numeric'});
                                lastUpdateText = `Analyzed ${dateStr}`;
                                
                                // Simple quick status dot based on prediction
                                const lowerType = String(latest.prediction).toLowerCase();
                                const highRisk = ['pain', 'discomfort', 'asphyxia', 'abnormal'];
                                let isHigh = false;
                                for(let r of highRisk) { if(lowerType.includes(r)) isHigh = true; }
                                
                                statusIconClass = isHigh ? "text-risk-high" : "text-risk-low";
                            }

                            const card = document.createElement('div');
                            card.className = "bg-white rounded-2xl border border-slate-200 p-6 patient-card relative";
                            card.onclick = () => window.location.href = `profile.html?id=${patient.id}`;
                            
                            card.innerHTML = `
                                <div class="absolute top-4 right-4 ${statusIconClass}">
                                    <i class="fas fa-circle text-[10px]"></i>
                                </div>
                                
                                <div class="flex items-center gap-4 mb-5">
                                    <div class="w-14 h-14 rounded-full ${colorClass} flex items-center justify-center font-bold text-xl shadow-inner">
                                        ${initial}
                                    </div>
                                    <div>
                                        <h3 class="font-bold text-slate-800 text-lg truncate pr-4">${patient.name}</h3>
                                        <p class="text-xs text-slate-500 font-medium">Guardian: ${patient.parent_name}</p>
                                    </div>
                                </div>
                                
                                <div class="grid grid-cols-2 gap-4 mb-5">
                                    <div class="bg-slate-50 rounded-xl p-3 text-center border border-slate-100">
                                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">Age</p>
                                        <p class="font-semibold text-slate-700">${patient.age_weeks} <span class="text-xs font-normal">wks</span></p>
                                    </div>
                                    <div class="bg-slate-50 rounded-xl p-3 text-center border border-slate-100">
                                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">Weight</p>
                                        <p class="font-semibold text-slate-700">${patient.weight_kg} <span class="text-xs font-normal">kg</span></p>
                                    </div>
                                </div>
                                
                                <div class="flex items-center justify-between pt-4 border-t border-slate-100">
                                    <span class="text-xs text-slate-500 font-medium flex items-center gap-1.5 border border-slate-200 px-2 py-1 rounded-md">
                                        <i class="fas fa-history text-[10px]"></i> ${lastUpdateText}
                                    </span>
                                    <i class="fas fa-chevron-right text-slate-300 text-sm"></i>
                                </div>
                            `;
                            grid.appendChild(card);
                        });
                    }
                }
            } catch (err) {
                console.error(err);
                document.getElementById('loading').innerHTML = '<p class="text-red-500 font-bold">Failed to load directory data.</p>';
            }
        }

        document.addEventListener('DOMContentLoaded', fetchPatients);
    </script>
</body>
</html>
