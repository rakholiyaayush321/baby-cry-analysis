<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Dashboard | NeuroCry AI</title>
<link rel="stylesheet" href="shared.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
.welcome-bar { background: linear-gradient(135deg, var(--blue), var(--teal)); border-radius: 16px; padding: 20px 24px; color: #fff; display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
.welcome-bar h2 { font-size: 18px; font-weight: 700; }
.welcome-bar p  { font-size: 13px; opacity: .85; margin-top: 3px; }
.empty-state    { text-align: center; padding: 48px 24px; color: var(--muted); }
.empty-state i  { font-size: 40px; margin-bottom: 12px; opacity: .4; }
.skeleton       { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: skeleton 1.5s infinite; border-radius: 6px; }
@keyframes skeleton { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
</style>
</head>
<body class="app-layout">

<!-- SIDEBAR -->
<aside class="sidebar" id="appSidebar"></aside>

<!-- MAIN -->
<div class="app-main">
  <header class="app-topbar">
    <div class="d-flex align-center gap-10">
      <button id="sidebarToggle" style="background:none;border:none;font-size:20px;color:var(--muted);display:none" class="md-only"><i class="fas fa-bars"></i></button>
      <h1>Overview</h1>
    </div>
    <div class="topbar-right">
      <div id="sysStatus" class="badge badge-blue"><i class="fas fa-circle" style="font-size:8px"></i> System Online</div>
      <button onclick="downloadBackup()" class="btn btn-ghost btn-sm" id="backupBtn"><i class="fas fa-download"></i> Backup</button>
      <button onclick="loadDashboard()" class="btn btn-ghost btn-sm"><i class="fas fa-rotate-right"></i> Refresh</button>
      <a href="add-patient.html" class="btn btn-primary btn-sm"><i class="fas fa-plus"></i> New Patient</a>
    </div>
  </header>

  <div class="app-content">

    <!-- WELCOME -->
    <div class="welcome-bar">
      <div>
        <h2 id="welcomeName">Welcome back! 👋</h2>
        <p id="welcomeDate">Loading dashboard...</p>
      </div>
      <a href="add-patient.html" class="btn" style="background:rgba(255,255,255,.2);color:#fff;border:1.5px solid rgba(255,255,255,.35)">
        <i class="fas fa-user-plus"></i> Register New Patient
      </a>
    </div>

    <!-- STAT CARDS -->
    <div class="stat-cards mb-24">
      <div class="stat-card">
        <div class="stat-icon blue"><i class="fas fa-hospital-user"></i></div>
        <div><div class="stat-label">Total Patients</div><div class="stat-value" id="statPatients">—</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon teal"><i class="fas fa-file-waveform"></i></div>
        <div><div class="stat-label">Total Analyses</div><div class="stat-value" id="statAnalyses">—</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon red"><i class="fas fa-triangle-exclamation"></i></div>
        <div><div class="stat-label">Risk Alerts</div><div class="stat-value" id="statAlerts">—</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon purple"><i class="fas fa-wave-square"></i></div>
        <div><div class="stat-label">Live Status</div><div class="stat-value" style="font-size:16px;color:var(--success)">Online</div></div>
      </div>
    </div>

    <!-- PATIENTS TABLE + CRY CHART -->
    <div style="display:grid;grid-template-columns:2fr 1fr;gap:20px;align-items:start">

      <!-- PATIENT TABLE -->
      <div class="card">
        <div class="card-header">
          <h2><i class="fas fa-users" style="color:var(--blue);margin-right:8px"></i>Recent Patients</h2>
          <a href="patients.html" class="btn btn-ghost btn-sm">View All <i class="fas fa-arrow-right"></i></a>
        </div>
        <div style="overflow-x:auto">
          <table class="tbl" id="patientTable">
            <thead>
              <tr>
                <th>Patient</th>
                <th>Age</th>
                <th>Weight</th>
                <th>Last Analysis</th>
                <th>Cry Type</th>
                <th>Risk</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="patientTableBody">
              <tr><td colspan="7" class="empty-state"><i class="fas fa-circle-notch fa-spin"></i><br>Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- CRY DISTRIBUTION -->
      <div class="card card-pad">
        <h2 style="font-size:14px;font-weight:700;color:var(--dark);margin-bottom:16px"><i class="fas fa-chart-pie" style="color:var(--blue);margin-right:8px"></i>Cry Distribution</h2>
        <div id="chartWrap" style="position:relative;height:200px">
          <canvas id="cryChart"></canvas>
        </div>
        <div id="chartEmpty" class="empty-state" style="display:none;padding:24px">
          <i class="fas fa-chart-pie"></i><p style="font-size:13px">No analysis data yet</p>
        </div>
        <div id="chartLegend" style="margin-top:14px"></div>
      </div>
    </div>

  </div><!-- /app-content -->
</div>

<script src="app.js"></script>
<script>
  requireAuth();
  initSidebar('dashboard');

  const user = getUser();
  document.getElementById('welcomeName').textContent = `Welcome back, ${user.name || 'Doctor'} 👋`;
  document.getElementById('welcomeDate').textContent = new Date().toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

  let cryChartInst = null;

  async function loadDashboard() {
    try {
      const data = await apiJSON('/api/dashboard');
      if (!data) return;

      document.getElementById('statPatients').textContent = data.total_patients;
      document.getElementById('statAnalyses').textContent = data.total_analyses;
      document.getElementById('statAlerts').textContent   = data.risk_alerts;

      renderPatientTable(data.recent_patients || []);
      renderCryChart(data.cry_distribution || {});
    } catch (err) {
      document.getElementById('patientTableBody').innerHTML =
        `<tr><td colspan="7" class="empty-state" style="color:var(--danger)"><i class="fas fa-exclamation-triangle"></i><br>${err.message}</td></tr>`;
    }
  }

  function renderPatientTable(patients) {
    const tbody = document.getElementById('patientTableBody');
    if (!patients.length) {
      tbody.innerHTML = `<tr><td colspan="7">
        <div class="empty-state"><i class="fas fa-users"></i><p>No patients yet. <a href="add-patient.html" style="color:var(--blue);font-weight:700">Register your first patient →</a></p></div>
      </td></tr>`;
      return;
    }
    tbody.innerHTML = patients.map(p => `
      <tr style="cursor:pointer" onclick="location.href='profile.html?id=${p.id}'">
        <td>
          <div class="d-flex align-center gap-10">
            <div style="width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--teal));color:#fff;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center">${(p.name||'?')[0].toUpperCase()}</div>
            <div><div class="font-bold" style="color:var(--dark)">${p.name}</div><div class="text-xs text-muted">${p.parent_name || '—'}</div></div>
          </div>
        </td>
        <td>${p.age_weeks || '—'}w</td>
        <td>${p.weight || '—'}kg</td>
        <td>${timeAgo(p.last_analysis)}</td>
        <td>${p.last_cry_type || '—'}</td>
        <td>${riskBadge(p.last_risk_level)}</td>
        <td><a href="profile.html?id=${p.id}" class="btn btn-ghost btn-sm"><i class="fas fa-eye"></i></a></td>
      </tr>`).join('');
  }

  const COLORS = ['#4A90E2','#2ED1C1','#EF4444','#F59E0B','#10B981','#8B5CF6','#F97316'];

  function renderCryChart(dist) {
    const labels = Object.keys(dist);
    const values = Object.values(dist);
    const wrap   = document.getElementById('chartWrap');
    const empty  = document.getElementById('chartEmpty');
    const legend = document.getElementById('chartLegend');

    if (!labels.length) { wrap.style.display='none'; empty.style.display='block'; return; }
    wrap.style.display='block'; empty.style.display='none';

    if (cryChartInst) cryChartInst.destroy();
    cryChartInst = new Chart(document.getElementById('cryChart'), {
      type: 'doughnut',
      data: { labels, datasets: [{ data: values, backgroundColor: COLORS, borderWidth: 0, hoverOffset: 6 }] },
      options: { responsive: true, maintainAspectRatio: false, cutout: '68%',
        plugins: { legend: { display: false }, tooltip: { backgroundColor: 'rgba(15,23,42,.85)', padding: 10, cornerRadius: 8 } } }
    });

    legend.innerHTML = labels.map((l, i) => `
      <div class="d-flex align-center gap-6" style="margin-bottom:6px">
        <div style="width:10px;height:10px;border-radius:50%;background:${COLORS[i % COLORS.length]}"></div>
        <span class="text-xs text-muted font-bold">${l}</span>
        <span class="text-xs" style="margin-left:auto;font-weight:700;color:var(--dark)">${values[i]}</span>
      </div>`).join('');
  }

  async function downloadBackup() {
    const btn = document.getElementById('backupBtn');
    const originalHtml = btn.innerHTML;
    try {
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Exporting...';
      btn.disabled = true;

      const res = await apiFetch('/api/backup');
      if (!res.ok) throw new Error((await res.json()).error || 'Failed to download backup');

      // Create blob and force download
      const blob = await res.blob();
      const url = window.URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `neurocry-backup-${new Date().toISOString().split('T')[0]}.json`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      window.URL.revokeObjectURL(url);
      
      showToast('Backup downloaded successfully', 'success');
    } catch (err) {
      showToast(err.message, 'error');
    } finally {
      btn.innerHTML = originalHtml;
      btn.disabled = false;
    }
  }

  loadDashboard();
</script>
</body>
</html>
